<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Idea Pitch Ratings</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="admin-page">
    <main class="admin-shell">
      <section id="login-panel" class="login-panel">
        <div>
          <p class="eyebrow">Class activity</p>
          <h1>Idea Pitch Ratings</h1>
        </div>
        <form id="login-form" class="inline-form">
          <label for="admin-pin">Admin PIN</label>
          <div class="form-row">
            <input id="admin-pin" name="pin" type="password" inputmode="numeric" autocomplete="current-password" required />
            <button type="submit">Open</button>
          </div>
          <p id="login-error" class="error-text" role="alert"></p>
        </form>
      </section>

      <section id="scoreboard" class="scoreboard hidden" aria-live="polite">
        <header class="top-bar">
          <div>
            <p class="eyebrow">Today's showcase</p>
            <h1>Idea Pitch Ratings</h1>
          </div>
          <div class="session-chip" id="session-chip">Set up class</div>
        </header>

        <section class="stage-grid">
          <article class="stage-panel" id="stage-panel">
            <div id="stage-content"></div>
          </article>

          <aside class="side-panel">
            <div class="qr-wrap">
              <button id="qr-open-button" class="qr-button" type="button" aria-label="Open QR code fullscreen">
                <img id="qr-code" alt="QR code for student voting" />
              </button>
              <div>
                <p class="eyebrow">Scan to vote</p>
                <p class="qr-note">Tap QR to enlarge</p>
                <p id="vote-url" class="vote-url"></p>
              </div>
            </div>

            <form id="setup-form" class="setup-form">
              <label for="idea-count">Presenters today</label>
              <div class="form-row">
                <input id="idea-count" name="ideaCount" type="number" min="1" max="40" value="30" required />
                <button type="submit">Save</button>
              </div>
            </form>

            <div class="control-grid">
              <button id="start-button" type="button">Open voting</button>
              <button id="stop-button" type="button" class="secondary">Close voting</button>
              <button id="end-button" type="button" class="secondary">Show final top 10</button>
              <button id="reset-button" type="button" class="ghost">Start over</button>
            </div>
            <p id="admin-error" class="error-text" role="alert"></p>
          </aside>
        </section>

        <section class="results-band">
          <div>
            <p class="eyebrow">Scores so far</p>
            <div id="result-strip" class="result-strip"></div>
          </div>
        </section>
      </section>
    </main>

    <div id="qr-fullscreen" class="qr-fullscreen" aria-hidden="true">
      <button id="qr-close-button" class="qr-close-button" type="button">Close</button>
      <div class="qr-fullscreen-card">
        <img id="qr-code-large" alt="Large QR code for student voting" />
        <p id="qr-fullscreen-url" class="qr-fullscreen-url"></p>
      </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/admin.js"></script>
  </body>
</html>
